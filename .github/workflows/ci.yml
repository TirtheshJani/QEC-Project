name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project (with dev extras)
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Type-check (advisory)
        continue-on-error: true
        run: uv run mypy src/qec_project

      - name: Tests
        run: uv run pytest

      - name: Verify reading list
        run: uv run python scripts/verify_reading_list.py
